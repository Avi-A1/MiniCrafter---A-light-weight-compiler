<!DOCTYPE html>
<html>
<head>
    <title>Minicrafter </title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1> Minicrafter</h1>

<form method="POST">

<div class="container">

    <!-- Source Code -->
    <div class="box">
        <h3>📝 Source Code</h3>
        <textarea name="code">{{code}}</textarea>
    </div>

    <!-- Bytecode -->
    <div class="box">
        <h3>⚙️ Generated Bytecode</h3>
        <pre>{{bytecode}}</pre>
    </div>

    <!-- Output -->
    <div class="box">
        <h3>📤 Output</h3>
        <pre>{{output}}</pre>
    </div>

</div>

<button type="submit">▶ Run Code</button>

</form>

</body>
</html>
